    <script>
      (function () {
        try {
          var savedLanguage = window.localStorage.getItem('cornerstone-language');
          var languagePreference =
            savedLanguage === 'en' || savedLanguage === 'es' || savedLanguage === 'system'
              ? savedLanguage
              : 'system';
          var preferredLanguage =
            (window.navigator.languages && window.navigator.languages[0]) ||
            window.navigator.language ||
            '';
          var systemLanguage = preferredLanguage.toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
          document.documentElement.lang =
            languagePreference === 'system' ? systemLanguage : languagePreference;

          var savedTheme = window.localStorage.getItem('cornerstone-theme');
          var theme =
            savedTheme === 'light' || savedTheme === 'dark' || savedTheme === 'system'
              ? savedTheme
              : 'system';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (error) {
          document.documentElement.setAttribute('data-theme', 'system');
        }
      })();
    </script>
